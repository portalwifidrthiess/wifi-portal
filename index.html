<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dr. Delia Thiess Clinic — Wi-Fi</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #fafafa;
    color: #1a1a1a;
    display: flex;
    justify-content: center;
    padding: 40px 16px;
  }

  .card {
    background: #ffffff;
    border: 1px solid #ececec;
    border-radius: 4px;
    max-width: 480px;
    width: 100%;
    padding: 48px 36px 40px;
  }

  .logo-img {
    display: block;
    max-width: 320px;
    width: 100%;
    height: auto;
    margin: 0 auto;
  }

  h1.welcome {
    text-align: center;
    font-size: 34px;
    letter-spacing: 3px;
    font-weight: 500;
    margin: 46px 0 18px;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: #d8d8d8;
    margin: 0 auto 28px;
  }

  .intro {
    text-align: center;
    font-size: 15px;
    line-height: 1.6;
    color: #333;
    margin: 0 0 32px;
  }

  label.field-label {
    display: block;
    font-size: 12px;
    letter-spacing: 1.5px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 10px;
  }

  .email-wrap {
    position: relative;
    margin-bottom: 26px;
  }

  .email-wrap svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #999;
  }

  input[type="email"] {
    width: 100%;
    padding: 16px 16px 16px 48px;
    border: 1px solid #e2e2e2;
    border-radius: 4px;
    font-size: 15px;
    color: #1a1a1a;
    background: #fff;
  }

  input[type="email"]::placeholder { color: #b3b3b3; }

  input[type="email"]:focus,
  .checkbox-row input:focus + .box {
    outline: 2px solid #1a1a1a;
    outline-offset: 2px;
  }

  .checkbox-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 22px;
    cursor: pointer;
  }

  .checkbox-row input {
    position: absolute;
    opacity: 0;
    width: 26px;
    height: 26px;
    margin: 0;
    cursor: pointer;
  }

  .box {
    width: 26px;
    height: 26px;
    min-width: 26px;
    border: 1.5px solid #c9c9c9;
    border-radius: 3px;
    position: relative;
    background: #fff;
  }

  .checkbox-row input:checked + .box {
    background: #1a1a1a;
    border-color: #1a1a1a;
  }

  .checkbox-row input:checked + .box::after {
    content: "";
    position: absolute;
    left: 8px;
    top: 3px;
    width: 6px;
    height: 12px;
    border: solid #fff;
    border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }

  .checkbox-text {
    font-size: 15px;
    line-height: 1.5;
    color: #1a1a1a;
    padding-top: 2px;
  }

  .checkbox-text a {
    color: #1a1a1a;
    text-decoration: underline;
  }

  .checkbox-text .muted {
    color: #999;
    font-size: 14px;
  }

  button#connectBtn {
    width: 100%;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 4px;
    padding: 18px;
    font-size: 15px;
    letter-spacing: 2px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.15s ease;
  }

  button#connectBtn:hover:not(:disabled) { background: #000; }

  button#connectBtn:disabled {
    background: #cfcfcf;
    cursor: not-allowed;
  }

  .footer-note {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 26px;
    text-align: center;
  }

  .footer-note p {
    margin: 0;
    font-size: 13px;
    color: #8a8a8a;
    line-height: 1.5;
  }

  .error-msg {
    display: none;
    font-size: 13px;
    color: #c0392b;
    margin: -12px 0 20px;
  }
</style>
</head>

  <div class="divider"></div>

  <p class="intro">
    Vă mulțumim că ne vizitați. Pentru a beneficia de acces la Wi-Fi-ul
    clinicii, vă rugăm să introduceți adresa dumneavoastră de email.
  </p>

    <label class="field-label" for="email">ADRESA DE EMAIL</label>
    <div class="email-wrap">
      <svg width="18" height="14" viewBox="0 0 24 20" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="1" y="1" width="22" height="18" rx="2"/>

      <input type="email" id="email" name="email" placeholder="exemplu@domeniu.ro" required>

      <span class="checkbox-text">

        <span class="muted">(opțional)</span>
      </span>
    </label>

    <button type="submit" id="connectBtn">
      CONECTARE LA WI-FI
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

        <path d="M12 19.5h.01"/>
      </svg>
    </button>
  </form>

  <div class="footer-note">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8a8a8a" stroke-width="1.5">
      <rect x="4" y="10" width="16" height="10" rx="2"/>
      <path d="M8 10V7a4 4 0 0 1 8 0v3"/>
    </svg>
    <p>Datele dumneavoastră sunt în siguranță.<br>Nu le vom distribui către terți.</p>

<script>
  // ============================================================
  // CONFIGURARE RUIJIE / REYEE (protocol WISPr, External Portal)
  // ============================================================
  //
  // Cand clientul se conecteaza la wifi, routerul Ruijie il
  // redirectioneaza catre aceasta pagina si ataseaza parametri
  // in URL (ex: ?userip=...&usermac=...&nasip=...&wlanacname=...).
  //
  // Deschide consola browserului (F12) dupa ce te conectezi la
  // wifi si esti redirectionat aici, ca sa vezi exact ce parametri
  // trimite routerul tau (se vor afisa mai jos).
  //
  // De regula, printre acei parametri se afla si un URL de
  // "succes" / "login" (poate aparea sub numele de: success,
  // redirect, login_url, res, wlanuserip callback etc.) catre
  // care browserul trebuie redirectionat ca sa se elibereze
  // efectiv internetul pentru acel client.
  //
  // Completeaza mai jos NUMELE exact al parametrului care contine
  // acel URL de succes, dupa ce l-ai identificat din consola:

  const SUCCESS_URL_PARAM_NAME = ""; // ex: "success" sau "redirect" -- de completat

  // Adresa de destinatie finala, dupa ce accesul e aprobat
  const INSTAGRAM_URL = "https://www.instagram.com/dr.delia.thiess.clinic/";

  // URL-ul din Google Apps Script (Deploy -> Web app), cel care se
  // termina in /exec. Lasa gol daca inca nu l-ai configurat.
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxn56KaXmYaXc3w8Bpkmir5eCxmPBQcH4rNA_tlOqaxo5a-g1Rwp9fbL_omUhxmgrk/exec";

  // ============================================================

  const params = new URLSearchParams(window.location.search);
  const paramsObj = Object.fromEntries(params.entries());
  console.log("Parametri primiti de la router:", paramsObj);

  const form = document.getElementById('portalForm');
  const btn = document.getElementById('connectBtn');
  const errorMsg = document.getElementById('errorMsg');

  form.addEventListener('submit', function (e) {
    e.preventDefault();

    const email = document.getElementById('email').value.trim();
    const termsAccepted = document.getElementById('terms').checked;

    if (!email || !termsAccepted) {
      errorMsg.style.display = 'block';
      return;
    }
    errorMsg.style.display = 'none';

    btn.disabled = true;
    btn.textContent = 'SE CONECTEAZĂ...';

    const marketingAccepted = document.getElementById('marketing').checked;
    const userMac = params.get('usermac') || params.get('mac') || '';

    // Trimitem email-ul si consimtamantul catre Google Sheets.
    // Folosim 'no-cors' pentru ca Apps Script nu raspunde cu headerele
    // CORS necesare unui fetch normal; datele tot ajung in Sheet,
    // doar ca nu putem citi raspunsul in JS -- nu ne trebuie oricum.
    if (GOOGLE_SCRIPT_URL) {
  fetch(GOOGLE_SCRIPT_URL, {
    method: "POST",
    mode: "no-cors",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: email,
      marketing: marketingAccepted,
      mac: userMac
    })
  })
  .then(() => {
    console.log("Date trimise către Google Sheets");
  })
  .catch((err) => {
    console.error("Eroare Google Sheets:", err);
  });
}

    // Pasul 1: daca stim URL-ul de succes trimis de router, il
    // apelam intai ca sa se elibereze internetul pentru client.
    const successUrl = SUCCESS_URL_PARAM_NAME
      ? params.get(SUCCESS_URL_PARAM_NAME)
      : null;

    function goToInstagram() {
      window.location.href = INSTAGRAM_URL;
    }

    if (successUrl) {
      // Navigam catre URL-ul de succes al routerului; unele routere
      // raspund cu propriul lor redirect, altele asteapta doar
      // accesarea acelui link. Dupa un scurt delay, mergem spre
      // Instagram indiferent de raspuns.
      window.location.href = decodeURIComponent(successUrl);
      setTimeout(goToInstagram, 1500);
    } else {
      // Nu avem inca configurat numele parametrului de succes:
      // mergem direct spre Instagram (acces liber, fara pas
      // suplimentar de autentificare pe partea de router).
      setTimeout(goToInstagram, 600);
    }
  });
</script>

</body>
</html>
